server:
  port: 8080

spring:
  application:
    name: obsession

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3307/obsession?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: obsession
    password: obsession

  jpa:
    hibernate:
      ddl-auto: create
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace


jwt:
  secret: "obsession-obsession-obsession-obsession-obsession-secret-key-123456789"
  access-token-expiration-millis: 3600000